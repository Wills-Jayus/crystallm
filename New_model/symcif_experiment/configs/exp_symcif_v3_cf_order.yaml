out_dir: 'runs/exp_symcif_v3_cf_order'
eval_interval: 250
eval_iters_train: 200
eval_iters_val: 200
log_interval: 1
always_save_checkpoint: True
validate: True

dataset: 'data/tokens_symcif_v3'
gradient_accumulation_steps: 1
batch_size: 128
block_size: 1024

n_layer: 8
n_head: 8
n_embd: 512
dropout: 0.1

learning_rate: 1e-3
decay_lr: True
max_iters: 3500
lr_decay_iters: 3500
min_lr: 1e-4
beta2: 0.99
warmup_iters: 100

seed: 1337
device: 'cuda:0'
dtype: 'bfloat16'
compile: True

sampling_temperature: 1.0
sampling_top_k: 10
sampling_max_new_tokens: 2048
